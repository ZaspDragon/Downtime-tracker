<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Downtime Tracker</title>

  <!-- STYLE -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
      color: #1a1a1a;
    }

    h1 {
      text-align: center;
      color: #0a58ca;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    input, button, textarea {
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      background: #0a58ca;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #084298;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .summary-card {
      background: #e9f2ff;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .summary-card .value {
      font-size: 22px;
      font-weight: bold;
      color: #0a58ca;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #0a58ca;
      color: white;
    }

    .badge-yes {
      background: red;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .badge-no {
      background: #ccc;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .downtime-row {
      background-color: #ffe5e5;
    }

    textarea {
      height: 120px;
    }

    #status {
      font-weight: bold;
      margin-top: 10px;
      color: #0a58ca;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>📊 Warehouse Downtime Tracker</h1>

  <!-- UPLOAD -->
  <div class="card">
    <h3>1) Upload Report</h3>

    <input type="file" id="pdfFile" accept="application/pdf">

    <div class="row">
      <button id="processBtn">Process PDF</button>
      <button id="sampleBtn">Load Demo</button>
      <button id="clearBtn">Clear</button>
    </div>

    <label>Downtime Threshold (minutes)</label>
    <input type="number" id="threshold" value="25">

    <p id="status"></p>
  </div>

  <!-- RAW TEXT -->
  <div class="card">
    <h3>Extracted Text</h3>
    <textarea id="rawText"></textarea>
  </div>

  <!-- SUMMARY -->
  <div class="card">
    <h3>2) Summary</h3>
    <div id="summaryCards" class="summary-grid"></div>

    <button id="exportSummaryBtn">Export Summary CSV</button>

    <table id="summaryTable">
      <thead>
        <tr>
          <th>Driver</th>
          <th>Total Moves</th>
          <th>Downtime Gaps</th>
          <th>Total Downtime</th>
          <th>Longest Gap</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- DETAILS -->
  <div class="card">
    <h3>3) Downtime Details</h3>

    <button id="exportDetailsBtn">Export Details CSV</button>

    <table id="detailsTable">
      <thead>
        <tr>
          <th>Driver</th>
          <th>From</th>
          <th>To</th>
          <th>Gap</th>
          <th>Downtime?</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<!-- PDF.js (MUST COME FIRST) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js";
</script>

<!-- YOUR APP -->
<script src="app.js"></script>

</body>
</html>
